name: Build and deploy to 20i

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          cp -r dist/. deploy/
          cp .htaccess deploy/.htaccess
          cp -r api deploy/api
          rm -f deploy/api/config.php deploy/api/schema.sql
          echo "----- deploy tree -----"
          find deploy -maxdepth 2 -type f | sort

      # Deploys the built site to public_html. No --delete, and config.php is
      # excluded, so the server's secrets/DB config are never touched.
      - name: Deploy to 20i via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -rltzv --exclude=config.php --exclude=schema.sql
          path: deploy/
          remote_path: public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
